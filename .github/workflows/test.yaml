name: Test

on:
  push:
    branches-ignore:
      - copier-update
      - mega-linter-fix/**
      - pre-commit-ci-update-config
      - release-please--branches**
  pull_request:
  workflow_dispatch:

env:
  FORCE_COLOR: 1

jobs:
  metadata:
    name: Metadata
    runs-on: ubuntu-latest
    outputs:
      has-tests: ${{ steps.collect.outputs.has-tests }}
      python-versions: ${{ steps.inspect.outputs.supported_python_classifiers_json_array }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: inspect
        name: Build and Inspect a Python Package
        uses: hynek/build-and-inspect-python-package@fe0a0fb1925ca263d076ca4f2c13e93a6e92a33e # v2
      - name: Setup Python
        uses: liblaf/actions/setup-python@1f83732587ff97f1babbe9218fdc5436dda1a16f # v1
      - id: collect
        name: Collect
        run: |-
          if pytest --collect-only; then
            echo 'has-tests=true' >> "$GITHUB_OUTPUT"
          else
            echo 'has-tests=false' >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test
    permissions:
      id-token: write
    needs:
      - metadata
    if: needs.metadata.outputs.has-tests == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # I don't know why, but it is present in the official example
      - name: Setup Python
        uses: liblaf/actions/setup-python@1f83732587ff97f1babbe9218fdc5436dda1a16f # v1
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - name: Test
        run: mise run test
      - if: success() || failure()
        name: Upload Coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          use_oidc: true
      - if: success() || failure()
        name: Upload Test Results
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          use_oidc: true
    strategy:
